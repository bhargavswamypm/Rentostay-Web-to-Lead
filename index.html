<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
    background: #f5f7fa;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    overflow: hidden;
}

/* ✅ Yellow Header */
.header {
    background: #fab417;
    color: #000;
    padding: 30px;
    text-align: center;
}

.logo {
    max-height: 60px;
    margin-bottom: 10px;
}

.header h1 {
    font-size: 28px;
}

.form-content {
    padding: 40px;
}

.alert {
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: none;
}

.alert.show {
    display: block;
}

.alert-success {
    background: #d4edda;
    color: #155724;
}

.alert-error {
    background: #f8d7da;
    color: #721c24;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 6px;
    font-weight: 500;
}

.required {
    color: red;
}

input {
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
}

input:focus {
    border-color: #fab417;
    outline: none;
}

.button-group {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.btn-primary {
    background: #fab417;
    color: black;
}

.btn-secondary {
    background: #eee;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <!-- 🔁 Replace with your real logo -->
        <img src="YOUR_LOGO_URL_HERE" class="logo">
        <h1>Contact Us</h1>
    </div>

    <div class="form-content">

        <div id="successAlert" class="alert alert-success">
            Submitted successfully!
        </div>

        <div id="errorAlert" class="alert alert-error">
            <span id="errorMessage"></span>
        </div>

        <form id="leadForm">

            <div class="form-row">
                <div class="form-group">
                    <label>Name <span class="required">*</span></label>
                    <input type="text" name="lastName" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Phone <span class="required">*</span></label>
                    <input type="tel" name="phone" required>
                </div>

                <div class="form-group">
                    <label>Budget</label>
                    <input type="text" name="budget">
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>

        </form>
    </div>
</div>

<script>
const SALESFORCE_INSTANCE = 'https://speed-flow-385--dev1.sandbox.my.salesforce-sites.com';
const SITE_ENDPOINT = '/services/apexrest/api/lead';

document.getElementById('leadForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    document.getElementById('successAlert').classList.remove('show');
    document.getElementById('errorAlert').classList.remove('show');

    const formData = new FormData(e.target);
    const data = {};

    formData.forEach((value, key) => {
        if (value) data[key] = value;
    });

    // ✅ Always Buyers
    data['leadType'] = 'Buyers';

    const res = await fetch(SALESFORCE_INSTANCE + SITE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
        document.getElementById('successAlert').classList.add('show');
        e.target.reset();
    } else {
        document.getElementById('errorMessage').textContent = result.message;
        document.getElementById('errorAlert').classList.add('show');
    }
});
</script>

</body>
</html>
