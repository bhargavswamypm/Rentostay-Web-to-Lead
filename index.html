<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rentostay - Contact Us</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
background:linear-gradient(135deg,#fab417,#e7a500);
min-height:100vh;
padding:20px;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
overflow:hidden;
}

/* Header */

.header{
background:#111;
color:white;
padding:40px;
text-align:center;
}

.logo{
width:220px;
margin-bottom:15px;
background:white;
padding:10px 16px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.header h1{
font-size:30px;
margin-bottom:10px;
}

.header p{
opacity:0.9;
}

/* Form Section */

.form-content{
padding:40px;
}

.alert{
padding:15px 20px;
border-radius:8px;
margin-bottom:25px;
font-size:14px;
display:none;
}

.alert.show{
display:block;
}

.alert-success{
background:#d4edda;
border:1px solid #c3e6cb;
color:#155724;
}

.alert-error{
background:#f8d7da;
border:1px solid #f5c6cb;
color:#721c24;
}

.form-section{
margin-bottom:30px;
}

.section-title{
font-size:18px;
font-weight:600;
color:#333;
margin-bottom:20px;
padding-bottom:10px;
border-bottom:2px solid #fab417;
}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.form-row.full{
grid-template-columns:1fr;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
font-size:14px;
font-weight:500;
color:#333;
margin-bottom:8px;
}

.required{
color:#e74c3c;
}

.form-group input,
.form-group select{
padding:12px 15px;
border:2px solid #e0e0e0;
border-radius:8px;
font-size:14px;
transition:0.3s;
}

.form-group input:focus,
.form-group select:focus{
outline:none;
border-color:#fab417;
box-shadow:0 0 0 3px rgba(250,180,23,0.2);
}

/* Buttons */

.button-group{
display:flex;
gap:15px;
margin-top:30px;
}

.btn{
flex:1;
padding:15px 30px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn-primary{
background:#fab417;
color:black;
}

.btn-primary:hover{
background:#e7a500;
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.btn-secondary{
background:#f0f0f0;
}

.btn-secondary:hover{
background:#e0e0e0;
}

/* Loading */

.loading{
display:none;
text-align:center;
padding:20px;
}

.loading.show{
display:block;
}

.spinner{
border:3px solid #f3f3f3;
border-top:3px solid #fab417;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* Mobile */

@media(max-width:768px){

.form-row{
grid-template-columns:1fr;
}

.container{
margin:20px auto;
}

.header,.form-content{
padding:30px 20px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="rentostay-logo.webp" class="logo" alt="Rentostay Logo">

<h1>Contact Us</h1>

<p>Find your perfect property with Rentostay</p>

</div>


<div class="form-content">

<div id="successAlert" class="alert alert-success">
<strong>Success!</strong> Thank you for your interest. We will contact you soon.
</div>

<div id="errorAlert" class="alert alert-error">
<strong>Error:</strong> <span id="errorMessage"></span>
</div>

<div id="loading" class="loading">
<div class="spinner"></div>
<p style="margin-top:10px">Submitting your information...</p>
</div>

<form id="leadForm">

<div class="form-section">

<div class="section-title">
Contact Information
</div>

<div class="form-row">

<div class="form-group">
<label>Name <span class="required">*</span></label>
<input type="text" name="lastName" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email">
</div>

</div>


<div class="form-row">

<div class="form-group">
<label>Phone <span class="required">*</span></label>
<input type="tel" name="phone" required>
</div>

<div class="form-group">
<label>Budget</label>
<input type="text" name="budget">
</div>

</div>


<div class="form-row">

<div class="form-group">
<label>Parent Property <span class="required">*</span></label>
<select id="parentProperty" name="parentProperty" onchange="filterChildProperties()" required>
<option value="">-- Select Parent Property --</option>
</select>
</div>

<div class="form-group">
<label>Type <span class="required">*</span></label>
<select id="leadType" name="leadType" onchange="filterChildProperties()" required>
<option value="">-- Select --</option>
<option value="Buyers">Properties for Sale</option>
<option value="Tenants">Properties for Rent</option>
</select>
</div>

</div>


<div class="form-row full">

<div class="form-group">
<label>Interested Property <span class="required">*</span></label>
<select id="property" name="property" required>
<option value="">-- Select Property --</option>
</select>
</div>

</div>

</div>


<div class="button-group">
<button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>
</div>

</form>

</div>

</div>

<script>

/* CONFIG */

const SALESFORCE_INSTANCE =
'https://speed-flow-385--dev1.sandbox.my.salesforce-sites.com';

const SITE_ENDPOINT =
'/services/apexrest/api/lead';


let allParentProperties=[];
let allChildProperties=[];


/* LOAD DATA */

window.addEventListener('DOMContentLoaded',loadAllProperties);

async function loadAllProperties(){

try{

const response=await fetch(SALESFORCE_INSTANCE+SITE_ENDPOINT);

const data=await response.json();

allParentProperties=data.parentProperties||[];
allChildProperties=data.childProperties||[];

const parentSelect=document.getElementById('parentProperty');

parentSelect.innerHTML='<option value="">-- Select Parent Property --</option>';

allParentProperties.forEach(p=>{

const option=document.createElement('option');

option.value=p.id;

option.textContent=p.name;

parentSelect.appendChild(option);

});

}

catch(error){

alert('Failed to load properties');

}

}


/* FILTER PROPERTIES */

function filterChildProperties(){

const parentPropertyId=document.getElementById('parentProperty').value;

const leadType=document.getElementById('leadType').value;

const propertySelect=document.getElementById('property');

propertySelect.innerHTML='<option value="">-- Select Property --</option>';

if(!parentPropertyId||!leadType)return;

const recordType=leadType==='Buyers'?'Sale':'Rent';

const filtered=allChildProperties.filter(p=>

p.parentPropertyId===parentPropertyId &&

p.recordType===recordType

);

filtered.forEach(p=>{

const option=document.createElement('option');

option.value=p.id;

option.textContent=p.name;

propertySelect.appendChild(option);

});

}


/* SUBMIT FORM */

document.getElementById('leadForm').addEventListener('submit',async function(e){

e.preventDefault();

document.getElementById('successAlert').classList.remove('show');

document.getElementById('errorAlert').classList.remove('show');

document.getElementById('loading').classList.add('show');

document.getElementById('submitBtn').disabled=true;

const formData=new FormData(e.target);

const data={};

formData.forEach((value,key)=>{

if(value)data[key]=value;

});

try{

const response=await fetch(SALESFORCE_INSTANCE+SITE_ENDPOINT,{

method:'POST',

headers:{'Content-Type':'application/json'},

body:JSON.stringify(data)

});

const result=await response.json();

document.getElementById('loading').classList.remove('show');

document.getElementById('submitBtn').disabled=false;

if(result.success){

document.getElementById('successAlert').classList.add('show');

alert("Thank you! Our team will contact you shortly.");

e.target.reset();

window.scrollTo({top:0,behavior:'smooth'});

}

else{

document.getElementById('errorMessage').textContent=result.message;

document.getElementById('errorAlert').classList.add('show');

}

}

catch(error){

document.getElementById('loading').classList.remove('show');

document.getElementById('submitBtn').disabled=false;

document.getElementById('errorMessage').textContent='Submission failed';

document.getElementById('errorAlert').classList.add('show');

}

});

</script>

</body>
</html>
