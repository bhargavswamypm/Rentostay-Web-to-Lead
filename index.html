<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .form-content {
            padding: 40px;
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-row.full {
            grid-template-columns: 1fr;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .required {
            color: #e74c3c;
            margin-left: 3px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .container {
                margin: 20px auto;
            }
            
            .header, .form-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Contact Us</h1>
            <p>Fill out the form below and we'll get back to you shortly</p>
        </div>
        
        <div class="form-content">
            <!-- Success Message -->
            <div id="successAlert" class="alert alert-success">
                <strong>Success!</strong> Thank you for your interest. We will contact you soon.
            </div>
            
            <!-- Error Message -->
            <div id="errorAlert" class="alert alert-error">
                <strong>Error:</strong> <span id="errorMessage"></span>
            </div>
            
            <!-- Loading Indicator -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Submitting your information...</p>
            </div>
            
            <form id="leadForm">
                <!-- Contact Information Section -->
                <div class="form-section">
                    <div class="section-title">Contact Information</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="lastName">Name <span class="required">*</span></label>
                            <input type="text" id="lastName" name="lastName" placeholder="Enter your name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="email@example.com">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone <span class="required">*</span></label>
                            <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="budget">Budget</label>
                            <input type="text" id="budget" name="budget" placeholder="Enter your budget">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="parentProperty">Parent Property<span class="required">*</span></label>
                            <select id="parentProperty" name="parentProperty" onchange="filterChildProperties()" required>
                                <option value="">-- Select Parent Property --</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="leadType">Type<span class="required">*</span></label>
                            <select id="leadType" name="leadType" onchange="filterChildProperties()" required>
                                <option value="">-- Select --</option>
                                <option value="Buyers">Properties for Sale</option>
                                <option value="Tenants">Properties for Rent</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row full">
                        <div class="form-group">
                            <label for="property">Interested Property<span class="required">*</span></label>
                            <select id="property" name="property" required>
                                <option value="">-- Select Property --</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THESE VALUES
        // ============================================
        const SALESFORCE_INSTANCE = 'https://speed-flow-385--dev1.sandbox.my.salesforce-sites.com';
        const SITE_ENDPOINT = '/services/apexrest/api/lead';
        
        // Store all properties data'
        let allParentProperties = [];
        let allChildProperties = [];
        
        // ============================================
        // LOAD DATA ON PAGE LOAD
        // ============================================
        window.addEventListener('DOMContentLoaded', async function() {
            await loadAllProperties();
        });
        
        async function loadAllProperties() {
            try {
                const response = await fetch(`${SALESFORCE_INSTANCE}${SITE_ENDPOINT}`, {
                    method: 'GET'
                });
                
                const data = await response.json();
                
                // Store the data
                allParentProperties = data.parentProperties || [];
                allChildProperties = data.childProperties || [];
                
                // Populate parent property dropdown
                const parentSelect = document.getElementById('parentProperty');
                parentSelect.innerHTML = '<option value="">-- Select Parent Property --</option>';
                
                allParentProperties.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = p.name;
                    parentSelect.appendChild(option);
                });
                
            } catch (error) {
                console.error('Error loading properties:', error);
                alert('Failed to load properties. Please refresh the page.');
            }
        }
        
        // ============================================
        // FILTER CHILD PROPERTIES
        // ============================================
        function filterChildProperties() {
            const parentPropertyId = document.getElementById('parentProperty').value;
            const leadType = document.getElementById('leadType').value;
            const propertySelect = document.getElementById('property');
            
            // Reset property dropdown
            propertySelect.innerHTML = '<option value="">-- Select Property --</option>';
            
            // Both selections must be made
            if (!parentPropertyId || !leadType) {
                return;
            }
            
            // Determine record type based on lead type
            const recordType = leadType === 'Buyers' ? 'Sale' : 'Rent';
            
            // Filter child properties
            const filteredProperties = allChildProperties.filter(p => 
                p.parentPropertyId === parentPropertyId && 
                p.recordType === recordType
            );
            
            if (filteredProperties.length > 0) {
                filteredProperties.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = p.name;
                    propertySelect.appendChild(option);
                });
            } else {
                propertySelect.innerHTML = '<option value="">No properties available</option>';
            }
        }
        
        // ============================================
        // FORM SUBMISSION LOGIC
        // ============================================
        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hide previous messages
            document.getElementById('successAlert').classList.remove('show');
            document.getElementById('errorAlert').classList.remove('show');
            
            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('submitBtn').disabled = true;
            
            // Collect form data
            const formData = new FormData(e.target);
            const data = {};
            
            formData.forEach((value, key) => {
                if (value) {
                    data[key] = value;
                }
            });
            
            try {
                // Send data to Salesforce
                const response = await fetch(SALESFORCE_INSTANCE + SITE_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                // Hide loading
                document.getElementById('loading').classList.remove('show');
                document.getElementById('submitBtn').disabled = false;
                
                if (result.success) {
                    // Show success message
                    document.getElementById('successAlert').classList.add('show');
                    window.alert("Thank you! Your details have been submitted successfully. Our team will contact you shortly.");
                    // Reset form
                    e.target.reset();
                    
                    // Scroll to top
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    // Show error message
                    document.getElementById('errorMessage').textContent = result.message;
                    document.getElementById('errorAlert').classList.add('show');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (error) {
                // Hide loading
                document.getElementById('loading').classList.remove('show');
                document.getElementById('submitBtn').disabled = false;
                
                // Show error message
                document.getElementById('errorMessage').textContent = 'Failed to submit form. Please try again later.';
                document.getElementById('errorAlert').classList.add('show');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                console.error('Error:', error);
                window.alert("Failed to submit form. Please try again later.");
            }
        });
        
        // Reset form handler
        document.getElementById('leadForm').addEventListener('reset', function() {
            document.getElementById('successAlert').classList.remove('show');
            document.getElementById('errorAlert').classList.remove('show');
        });
    </script>
</body>
</html>
