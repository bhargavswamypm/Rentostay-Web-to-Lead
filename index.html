<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .form-content {
            padding: 40px;
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-row.full {
            grid-template-columns: 1fr;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .required {
            color: #e74c3c;
            margin-left: 3px;
        }
        
        .form-group input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>Contact Us</h1>
        <p>Fill out the form below and we'll get back to you shortly</p>
    </div>

    <div class="form-content">

        <div id="successAlert" class="alert alert-success">
            <strong>Success!</strong> We will contact you soon.
        </div>

        <div id="errorAlert" class="alert alert-error">
            <strong>Error:</strong> <span id="errorMessage"></span>
        </div>

        <form id="leadForm">

            <div class="form-section">
                <div class="section-title">Contact Information</div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Name <span class="required">*</span></label>
                        <input type="text" name="lastName" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone <span class="required">*</span></label>
                        <input type="tel" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label>Budget</label>
                        <input type="text" name="budget">
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>

        </form>
    </div>
</div>

<script>
const SALESFORCE_INSTANCE = 'https://speed-flow-385--dev1.sandbox.my.salesforce-sites.com';
const SITE_ENDPOINT = '/services/apexrest/api/lead';

document.getElementById('leadForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    document.getElementById('successAlert').classList.remove('show');
    document.getElementById('errorAlert').classList.remove('show');

    const formData = new FormData(e.target);
    const data = {};

    formData.forEach((value, key) => {
        if (value) data[key] = value;
    });

    // ✅ Always Buyers
    data['leadType'] = 'Buyers';

    try {
        const response = await fetch(SALESFORCE_INSTANCE + SITE_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
            document.getElementById('successAlert').classList.add('show');
            e.target.reset();
        } else {
            document.getElementById('errorMessage').textContent = result.message;
            document.getElementById('errorAlert').classList.add('show');
        }

    } catch (error) {
        document.getElementById('errorMessage').textContent = 'Failed to submit form';
        document.getElementById('errorAlert').classList.add('show');
    }
});
</script>

</body>
</html>
