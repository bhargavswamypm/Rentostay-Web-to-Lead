<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>

<div class="container">
    <h1>Contact Us</h1>

    <div id="successAlert" style="display:none;color:green;">
        Thank you! We will contact you soon.
    </div>

    <div id="errorAlert" style="display:none;color:red;">
        <span id="errorMessage"></span>
    </div>

    <form id="leadForm">

        <label>Name *</label>
        <input type="text" name="lastName" required>

        <label>Email</label>
        <input type="email" name="email">

        <label>Phone *</label>
        <input type="tel" name="phone" required>

        <label>Budget</label>
        <input type="text" name="budget">

        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</div>

<script>
const SALESFORCE_INSTANCE = 'https://speed-flow-385--dev1.sandbox.my.salesforce-sites.com';
const SITE_ENDPOINT = '/services/apexrest/api/lead';

document.getElementById('leadForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    document.getElementById('successAlert').style.display = 'none';
    document.getElementById('errorAlert').style.display = 'none';

    const formData = new FormData(e.target);
    const data = {};

    formData.forEach((value, key) => {
        if (value) data[key] = value;
    });

    // ✅ Always Buyers
    data['leadType'] = 'Buyers';

    try {
        const response = await fetch(SALESFORCE_INSTANCE + SITE_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
            document.getElementById('successAlert').style.display = 'block';
            e.target.reset();
        } else {
            document.getElementById('errorMessage').textContent = result.message;
            document.getElementById('errorAlert').style.display = 'block';
        }

    } catch (error) {
        document.getElementById('errorMessage').textContent = 'Submission failed';
        document.getElementById('errorAlert').style.display = 'block';
    }
});
</script>

</body>
</html>
